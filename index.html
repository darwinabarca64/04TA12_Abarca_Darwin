<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conjetura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Números de Collatz-Oscar</h1>

        <div class="card">
            <h2>Analizar Número</h2>
            <div class="form-grid">
                <input type="number" id="inputNumero" placeholder="Introduce un número (cualquier número entero positivo)">
                <button class="primary" onclick="visualizarTrayectoria()">Calcular Trayectoria</button>
            </div>
        </div>

        <!-- SECCIÓN DE RESULTADOS -->
        <div class="card">
            <h2>Resultados del Análisis</h2>
            <div id="resultados" class="resultado-box">
                <p>Introduce un número para comenzar el descenso...</p>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
